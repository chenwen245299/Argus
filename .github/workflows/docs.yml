name: Deploy Docs to Pages

on:
  push:
    branches: [main]
    # Only rebuild the docs site when something that affects it changes.
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

# Permissions required by the GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # needed for VitePress lastUpdated git timestamps
          lfs: true # pull real video/image media stored via Git LFS, not pointer files

      - uses: actions/configure-pages@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # --ignore-scripts skips the app's postinstall (Vditor copy), which the
      # docs build does not need.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build docs
        run: npm run docs:build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
